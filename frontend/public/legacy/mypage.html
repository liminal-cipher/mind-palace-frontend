<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>마이페이지 · 기억의 궁전</title>
<style>
  :root {
    --bg: #17110d; --surface: #221a14; --surface2: #2a211b;
    --paper: #f5f0e8; --muted: rgba(245,240,232,0.62); --line: rgba(245,240,232,0.14);
    --acc: #fca435; --acc-ink: #3a2a12;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--paper);
    font-family: "Pretendard", system-ui, -apple-system, "Malgun Gothic", sans-serif;
    line-height: 1.6;
  }
  .top {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; gap: 16px;
    padding: 16px 24px; background: rgba(23,17,13,0.9); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .top .brand { font-weight: 700; font-size: 16px; color: var(--paper); text-decoration: none; }
  .top .spacer { flex: 1; }
  .top a.back { color: var(--muted); text-decoration: none; font-size: 13px; }
  .top a.back:hover { color: var(--paper); }
  .logout-btn {
    font-size: 13px; color: var(--muted); background: none; border: 1px solid var(--line);
    border-radius: 18px; padding: 6px 14px; cursor: pointer;
  }
  .logout-btn:hover { color: var(--paper); border-color: var(--acc); }
  .wrap { max-width: 860px; margin: 0 auto; padding: 32px 24px 80px; }
  h1 { font-size: 26px; margin: 8px 0 28px; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 22px; margin-bottom: 20px; }
  .card h2 { font-size: 16px; margin: 0 0 16px; color: var(--paper); }
  /* 프로필 */
  .profile { display: flex; align-items: center; gap: 18px; }
  .avatar {
    width: 64px; height: 64px; border-radius: 50%; background: var(--surface2);
    display: flex; align-items: center; justify-content: center; font-size: 26px; color: var(--acc);
    overflow: hidden; flex: 0 0 auto;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .profile .pname { font-size: 18px; font-weight: 600; }
  .profile .pmail { font-size: 13px; color: var(--muted); }
  /* 통계 */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .stat { background: var(--surface2); border-radius: 12px; padding: 16px; text-align: center; }
  .stat .num { font-size: 24px; font-weight: 700; color: var(--acc); }
  .stat .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }
  /* AI 토큰 사용량 */
  .tok-hero { text-align: center; padding: 6px 0 2px; }
  .tok-hero .big { font-size: 40px; font-weight: 800; color: var(--acc); line-height: 1.1; letter-spacing: -0.5px; }
  .tok-hero .cap { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .tok-split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .tok-note { font-size: 12px; color: var(--muted); margin-top: 14px; line-height: 1.55; }
  /* 내 서재 */
  .lib-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px; border: 1px solid var(--line); border-radius: 12px; margin-bottom: 10px;
  }
  .lib-item .li-main { flex: 1; min-width: 0; }
  .lib-item .li-title { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lib-item .li-date { font-size: 12px; color: var(--muted); }
  .lib-item button {
    font-size: 13px; font-weight: 600; background: var(--acc); color: var(--acc-ink);
    border: none; border-radius: 18px; padding: 8px 16px; cursor: pointer; flex: 0 0 auto;
  }
  .lib-item button.ghost { background: none; color: var(--muted); border: 1px solid var(--line); }
  .empty { color: var(--muted); font-size: 14px; padding: 8px 0; }
  .quick { display: flex; flex-wrap: wrap; gap: 12px; }
  .quick a {
    font-size: 14px; color: var(--paper); text-decoration: none;
    background: var(--surface2); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 18px; transition: border-color 0.2s;
  }
  .quick a:hover { border-color: var(--acc); }
  .need-login { text-align: center; padding: 60px 20px; }
  .need-login a {
    display: inline-block; margin-top: 16px; background: var(--acc); color: var(--acc-ink);
    font-weight: 600; text-decoration: none; padding: 10px 22px; border-radius: 22px;
  }
  @media (max-width: 560px) { .stats { grid-template-columns: 1fr; } }
</style>
</head>
<body>
  <div class="top">
    <a class="brand" href="/legacy/home.html">기억의 궁전</a>
    <a class="back" href="/legacy/home.html">← 홈으로</a>
    <span class="spacer"></span>
    <button type="button" class="logout-btn" id="logoutBtn" hidden>로그아웃</button>
  </div>

  <div class="wrap" id="wrap">
    <h1>마이페이지</h1>

    <div id="authed" hidden>
      <div class="card">
        <h2>프로필</h2>
        <div class="profile">
          <div class="avatar" id="avatar">宮</div>
          <div>
            <div class="pname" id="pname">사용자</div>
            <div class="pmail" id="pmail"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>학습 통계</h2>
        <div class="stats">
          <div class="stat"><div class="num" id="statItems">0</div><div class="lbl">저장한 자료</div></div>
          <div class="stat"><div class="num" id="statRooms">0</div><div class="lbl">만든 방</div></div>
          <div class="stat"><div class="num" id="statLast">–</div><div class="lbl">최근 학습</div></div>
        </div>
      </div>

      <div class="card" id="usageCard" hidden>
        <h2>AI 토큰 사용량</h2>
        <div class="tok-hero">
          <div class="big" id="tokTotal">0</div>
          <div class="cap">총 사용 토큰</div>
        </div>
        <div class="tok-split">
          <div class="stat"><div class="num" id="tokAnalysis">0</div><div class="lbl">분석</div></div>
          <div class="stat"><div class="num" id="tokChat">0</div><div class="lbl">대화</div></div>
        </div>
        <div class="tok-note">자료를 분석하고 답변할 때 사용한 AI 토큰이에요. 더 큰 자료를 올리거나 질문을 많이 할수록 늘어나요.</div>
      </div>

      <div class="card">
        <h2>내 서재</h2>
        <div id="libList"><div class="empty">불러오는 중…</div></div>
      </div>

      <div class="card">
        <h2>빠른 이동</h2>
        <div class="quick">
          <a href="/legacy/home.html#upload">📄 PDF 업로드하러 가기</a>
          <a href="/legacy/region-select.html">🏛 3D 둘러보기</a>
        </div>
      </div>
    </div>

    <div id="anon" class="need-login" hidden>
      <div>마이페이지는 로그인 후 이용할 수 있어요.</div>
      <a id="loginLink" href="#">Microsoft로 로그인</a>
    </div>
  </div>

<script>
(function () {
  const here = encodeURIComponent(location.pathname + location.search);
  const $ = (id) => document.getElementById(id);

  function showAnon() {
    $('anon').hidden = false;
    $('loginLink').href = '/.auth/login/aad?post_login_redirect_uri=' + here;
  }

  function showAuthed(principal) {
    $('authed').hidden = false;
    $('logoutBtn').hidden = false;
    $('logoutBtn').addEventListener('click', function () {
      location.href = '/.auth/logout?post_logout_redirect_uri=' +
        encodeURIComponent('/legacy/home.html');
    });

    // 프로필 — 정규화된 /api/me: { email, displayName, avatarUrl, provider }
    const email = principal.email || '';
    const name = principal.displayName || email || '사용자';
    const pic = principal.avatarUrl;
    $('pname').textContent = name;
    $('pmail').textContent = email;
    if (pic) $('avatar').innerHTML = '<img alt="" src="' + pic + '" referrerpolicy="no-referrer">';

    loadLibrary();
    loadUsage();
  }

  function fmtNum(n) {
    try { return Number(n || 0).toLocaleString('ko-KR'); } catch (_) { return String(n || 0); }
  }

  function loadUsage() {
    fetch('/api/usage/me', { credentials: 'include' })
      .then((r) => r.ok ? r.json() : null)
      .then((u) => {
        if (!u) return;
        $('tokTotal').textContent = fmtNum(u.totalTokens);
        $('tokAnalysis').textContent = fmtNum(u.analysisTokens);
        $('tokChat').textContent = fmtNum(u.chatTokens);
        $('usageCard').hidden = false;   // 값이 준비된 뒤 노출(0 깜빡임 방지)
      })
      .catch(() => {});
  }

  function fmtDate(iso) {
    if (!iso) return '–';
    try { return new Date(iso).toLocaleDateString('ko-KR', { year: '2-digit', month: '2-digit', day: '2-digit' }); }
    catch (_) { return iso.slice(0, 10); }
  }

  function loadLibrary() {
    fetch('/api/library/list', { credentials: 'include' })
      .then((r) => r.ok ? r.json() : { items: [] })
      .then((data) => {
        const items = (data && data.items) || [];
        // 통계
        $('statItems').textContent = items.length;
        let rooms = 0, last = '';
        items.forEach((it) => { rooms += (it.rooms || 0); if (it.savedAt > last) last = it.savedAt; });
        $('statRooms').textContent = rooms;
        $('statLast').textContent = last ? fmtDate(last) : '–';
        // 목록
        const list = $('libList');
        if (!items.length) {
          list.innerHTML = '<div class="empty">아직 저장한 학습 자료가 없어요. PDF를 올려 궁전을 만들고 저장해 보세요.</div>';
          return;
        }
        list.innerHTML = '';
        items.forEach((it) => {
          const row = document.createElement('div');
          row.className = 'lib-item';
          row.innerHTML =
            '<div class="li-main"><div class="li-title"></div><div class="li-date">' + fmtDate(it.savedAt) + '</div></div>' +
            '<button class="open">불러오기</button>' +
            '<button class="ghost del">삭제</button>';
          row.querySelector('.li-title').textContent = it.title || '제목 없음';
          row.querySelector('.open').addEventListener('click', () => openItem(it.id));
          row.querySelector('.del').addEventListener('click', () => delItem(it.id, row));
          list.appendChild(row);
        });
      })
      .catch(() => { $('libList').innerHTML = '<div class="empty">목록을 불러오지 못했어요.</div>'; });
  }

  function openItem(id) {
    fetch('/api/library/' + encodeURIComponent(id), { credentials: 'include' })
      .then((r) => r.ok ? r.json() : null)
      .then((item) => {
        if (!item) { alert('불러오지 못했어요.'); return; }
        try {
          localStorage.setItem('mp_palace', JSON.stringify(item.palace));
          sessionStorage.setItem('mp_palace', JSON.stringify(item.palace));
          if (item.designs) localStorage.setItem('studio_designs', JSON.stringify(item.designs));
          // 의미부여(mp_mnemo:*)·노드편집(mw_edit:*) 오버레이 복원 — 저장 시의 localStorage 키 그대로 되돌림
          const restoreMap = (m) => {
            if (!m || typeof m !== 'object') return;
            for (const k in m) {
              try { localStorage.setItem(k, typeof m[k] === 'string' ? m[k] : JSON.stringify(m[k])); } catch (_) {}
            }
          };
          restoreMap(item.mnemonics);
          restoreMap(item.edits);
          // 저장 id 연속성: 이 궁전(palaceId)이 곧 이 library 항목 → 재저장 시 덮어쓰기
          try {
            const pid = item.palace && item.palace.palace && item.palace.palace.id;
            if (pid) { const m = JSON.parse(localStorage.getItem('mp_lib_items') || '{}'); m[pid] = id; localStorage.setItem('mp_lib_items', JSON.stringify(m)); }
          } catch (_) {}
        } catch (_) {}
        location.href = '/legacy/region-select.html';
      })
      .catch(() => alert('불러오지 못했어요.'));
  }

  function delItem(id, row) {
    if (!confirm('이 자료를 삭제할까요?')) return;
    fetch('/api/library/' + encodeURIComponent(id), { method: 'DELETE', credentials: 'include' })
      .then(() => { row.remove(); loadLibrary(); })
      .catch(() => alert('삭제하지 못했어요.'));
  }

  // 로그인 확인 — 정규화된 /api/me 사용(전체 이메일 일관 표시). 비로그인은 401 → 익명.
  fetch('/api/me', { credentials: 'include' })
    .then((r) => r.ok ? r.json() : null)
    .then((profile) => { if (profile) showAuthed(profile); else showAnon(); })
    .catch(showAnon);
})();
</script>
</body>
</html>
