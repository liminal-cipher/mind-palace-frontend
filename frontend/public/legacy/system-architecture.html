<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>기억의 궁전 · Runtime Architecture</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --blue:#3182F6; --blue-d:#1B64DA; --green:#00B27A; --amber:#FF9500;
    --ink:#191F28; --gray7:#4E5968; --gray5:#8B95A1; --gray3:#D1D6DB;
  }
  *{margin:0;padding:0;box-sizing:border-box;word-break:keep-all;}
  body{font-family:'Pretendard',-apple-system,'Malgun Gothic',sans-serif;background:#fff;color:var(--ink);
    letter-spacing:-.01em;-webkit-font-smoothing:antialiased;padding:38px 28px 48px;}
  .head h1{font-size:30px;font-weight:800;letter-spacing:-.03em;}
  .head .sub{font-size:14.5px;color:var(--gray5);font-weight:600;margin-top:6px;}
  .scroll{margin-top:24px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .scroll svg{display:block;width:1480px;max-width:none;height:auto;}
  @media(max-width:1480px){ .hint{display:block;} }
  .hint{display:none;font-size:12.5px;color:var(--gray5);font-weight:600;margin-top:8px;}

  /* SVG 텍스트 클래스 */
  .nl{font:800 17px 'Pretendard';fill:var(--ink);}        /* 노드 라벨 */
  .ns{font:700 12.5px 'Pretendard';fill:var(--gray5);}    /* 서브라벨(일반) */
  .tech-az{font:800 12.5px 'Pretendard';fill:var(--blue);}   /* Azure */
  .tech-gp{font:800 12.5px 'Pretendard';fill:var(--green);}  /* GPT */
  .tech-or{font:800 12.5px 'Pretendard';fill:var(--amber);}
  .ed{font:700 13px 'Pretendard';fill:var(--gray7);}      /* 엣지 라벨 */
  .ed-b{font:800 13px 'Pretendard';fill:var(--blue-d);}   /* 강조 엣지 */
  .cap{font:800 13px 'Pretendard';fill:var(--gray5);letter-spacing:.06em;}  /* 컨테이너 캡션 */
  .ours-cap{font:800 13px 'Pretendard';fill:var(--blue);letter-spacing:.04em;}
  .ico{font-size:27px;}
  .ann{font:700 12px 'Pretendard';}

  .legend{display:flex;gap:20px;margin-top:18px;font-size:13px;font-weight:700;color:var(--gray7);flex-wrap:wrap;}
  .legend .it{display:flex;align-items:center;gap:7px;}
  .legend .sw{width:14px;height:14px;border-radius:4px;}
  footer{margin-top:26px;font-size:13px;color:var(--gray5);font-weight:500;line-height:1.7;}
  footer b{color:var(--gray7);} footer a{color:var(--blue);font-weight:800;text-decoration:none;}
</style>
</head>
<body>
  <div class="head">
    <h1>기억의 궁전 · Runtime Architecture</h1>
    <div class="sub">PDF 한 장 → 의미 구조 → 걸어 다니는 3D 학습 공간 · 4개 모듈 (3D = 우리 구현)</div>
  </div>

  <div class="scroll">
  <svg viewBox="0 0 1480 560" role="img" aria-label="기억의 궁전 시스템 아키텍처">
    <defs>
      <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L7,3 L0,6 Z" fill="#4E5968"/>
      </marker>
      <marker id="ahb" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L7,3 L0,6 Z" fill="#3182F6"/>
      </marker>
      <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1A2A4A" flood-opacity="0.10"/>
      </filter>
    </defs>

    <!-- 컨테이너 A: 별도 모듈 -->
    <rect x="158" y="150" width="560" height="320" rx="20" fill="#F4F6F8" stroke="#D1D6DB" stroke-width="1.5" stroke-dasharray="6 5"/>
    <text x="182" y="178" class="cap">데이터 · 의미 구조 — 별도 모듈</text>

    <!-- 컨테이너 B: 우리 구현 3D -->
    <rect x="792" y="150" width="632" height="320" rx="20" fill="#EAF2FE" stroke="#3182F6" stroke-width="2"/>
    <text x="816" y="178" class="ours-cap">★ 우리 구현 — 3D</text>

    <!-- ===== 엣지(화살표 + 라벨) ===== -->
    <!-- 학습자 → PDF -->
    <line x1="120" y1="262" x2="196" y2="262" stroke="#4E5968" stroke-width="2.2" marker-end="url(#ah)"/>
    <text x="158" y="250" text-anchor="middle" class="ed">PDF 업로드</text>
    <!-- PDF → GraphRAG -->
    <line x1="306" y1="262" x2="372" y2="262" stroke="#4E5968" stroke-width="2.2" marker-end="url(#ah)"/>
    <text x="339" y="250" text-anchor="middle" class="ed">텍스트·이미지</text>
    <!-- GraphRAG → 방나누기 -->
    <line x1="490" y1="262" x2="556" y2="262" stroke="#4E5968" stroke-width="2.2" marker-end="url(#ah)"/>
    <text x="523" y="250" text-anchor="middle" class="ed">개념·관계</text>
    <!-- GraphRAG ↓ RAG -->
    <line x1="430" y1="296" x2="430" y2="372" stroke="#4E5968" stroke-width="2.2" marker-end="url(#ah)"/>
    <text x="446" y="340" class="ed" text-anchor="start">같은 그래프</text>
    <!-- 방나누기 → 마커파이프라인 (A→B, 강조) -->
    <line x1="676" y1="262" x2="838" y2="262" stroke="#3182F6" stroke-width="2.6" marker-end="url(#ahb)"/>
    <rect x="700" y="226" width="112" height="24" rx="8" fill="#fff" stroke="#3182F6" stroke-width="1.4"/>
    <text x="756" y="243" text-anchor="middle" class="ed-b">palace.json</text>
    <!-- 마커 → 비전 -->
    <line x1="958" y1="262" x2="1024" y2="262" stroke="#4E5968" stroke-width="2.2" marker-end="url(#ah)"/>
    <text x="991" y="250" text-anchor="middle" class="ed">스크린샷</text>
    <!-- 비전 → 1인칭 -->
    <line x1="1158" y1="262" x2="1262" y2="262" stroke="#4E5968" stroke-width="2.2" marker-end="url(#ah)"/>
    <text x="1210" y="250" text-anchor="middle" class="ed">정확한 이름</text>
    <!-- 1인칭 → 출력 -->
    <line x1="1320" y1="298" x2="1320" y2="372" stroke="#4E5968" stroke-width="2.2" marker-end="url(#ah)"/>

    <!-- ===== 노드 ===== -->
    <!-- 학습자 -->
    <circle cx="80" cy="262" r="27" fill="#fff" stroke="#E5E8EB" filter="url(#sh)"/>
    <text x="80" y="262" text-anchor="middle" dominant-baseline="central" class="ico">🧑‍🎓</text>
    <text x="80" y="312" text-anchor="middle" class="nl">학습자</text>
    <text x="80" y="332" text-anchor="middle" class="ns">PDF 업로드</text>

    <!-- PDF 전처리 -->
    <circle cx="250" cy="262" r="27" fill="#fff" stroke="#E5E8EB" filter="url(#sh)"/>
    <text x="250" y="262" text-anchor="middle" dominant-baseline="central" class="ico">📄</text>
    <text x="250" y="312" text-anchor="middle" class="nl">PDF 전처리</text>
    <text x="250" y="331" text-anchor="middle" class="tech-az">Azure Doc Intelligence</text>
    <text x="250" y="348" text-anchor="middle" class="ns">텍스트·이미지 추출 · 청킹</text>

    <!-- GraphRAG -->
    <circle cx="430" cy="262" r="27" fill="#fff" stroke="#E5E8EB" filter="url(#sh)"/>
    <text x="430" y="262" text-anchor="middle" dominant-baseline="central" class="ico">🕸️</text>
    <text x="430" y="312" text-anchor="middle" class="nl">GraphRAG</text>
    <text x="430" y="331" text-anchor="middle" class="ns">개념 그래프 인덱싱</text>

    <!-- 방 나누기 -->
    <circle cx="620" cy="262" r="27" fill="#fff" stroke="#E5E8EB" filter="url(#sh)"/>
    <text x="620" y="262" text-anchor="middle" dominant-baseline="central" class="ico">🧩</text>
    <text x="620" y="312" text-anchor="middle" class="nl">방 나누기</text>
    <text x="620" y="331" text-anchor="middle" class="ns">의미 클러스터링 → 챕터</text>

    <!-- RAG 챗봇 (branch) -->
    <circle cx="430" cy="400" r="24" fill="#fff" stroke="#E5E8EB" filter="url(#sh)"/>
    <text x="430" y="400" text-anchor="middle" dominant-baseline="central" style="font-size:23px">💬</text>
    <text x="430" y="445" text-anchor="middle" class="nl" style="font-size:15px">RAG · 학습 챗봇</text>
    <text x="430" y="463" text-anchor="middle" class="ns">질의응답 · 의미부여 · 퀴즈</text>

    <!-- 3D 마커 파이프라인 (우리) -->
    <circle cx="900" cy="262" r="29" fill="#fff" stroke="#3182F6" stroke-width="2" filter="url(#sh)"/>
    <text x="900" y="262" text-anchor="middle" dominant-baseline="central" class="ico">🎮</text>
    <text x="900" y="314" text-anchor="middle" class="nl">마커 파이프라인</text>
    <text x="900" y="333" text-anchor="middle" class="ns">방 GLB · 검출→이름→동선 7단계</text>

    <!-- AI 비전 (우리) -->
    <circle cx="1100" cy="262" r="29" fill="#fff" stroke="#3182F6" stroke-width="2" filter="url(#sh)"/>
    <text x="1100" y="262" text-anchor="middle" dominant-baseline="central" class="ico">📸</text>
    <text x="1100" y="314" text-anchor="middle" class="nl">AI 비전 명명</text>
    <text x="1100" y="333" text-anchor="middle"><tspan class="tech-az">Azure Vision</tspan><tspan class="ns"> + </tspan><tspan class="tech-gp">GPT-4.1</tspan></text>

    <!-- 1인칭 공간 (우리) -->
    <circle cx="1320" cy="262" r="29" fill="#fff" stroke="#3182F6" stroke-width="2" filter="url(#sh)"/>
    <text x="1320" y="262" text-anchor="middle" dominant-baseline="central" class="ico">🚶</text>
    <text x="1320" y="314" text-anchor="middle" class="nl">1인칭 공간</text>
    <text x="1320" y="333" text-anchor="middle" class="ns">마커 따라 걸으며 학습</text>

    <!-- 출력 -->
    <text x="1320" y="402" text-anchor="middle" style="font-size:15px;font-weight:800;fill:#1B64DA;">🏛 기억의 궁전</text>
    <text x="1320" y="422" text-anchor="middle" class="ns">완성된 3D 학습 공간</text>

    <!-- ===== 주석(dashed) ===== -->
    <!-- moat: 방 나누기 위 -->
    <rect x="486" y="92" width="270" height="40" rx="11" fill="#fff" stroke="#00B27A" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="621" y="110" text-anchor="middle" class="ann" fill="#00875A">🏰 의미 거리로 '방 구조' · 간섭 회피</text>
    <text x="621" y="125" text-anchor="middle" class="ann" fill="#00875A" style="font-weight:600;opacity:.85">— 핵심 경쟁력(moat)</text>
    <line x1="621" y1="132" x2="621" y2="235" stroke="#00B27A" stroke-width="1.3" stroke-dasharray="4 4"/>

    <!-- 하이브리드: 마커 파이프라인 아래 -->
    <rect x="800" y="392" width="300" height="40" rx="11" fill="#fff" stroke="#3182F6" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="950" y="410" text-anchor="middle" class="ann" fill="#1B64DA">🎯 이름 신뢰 + 비전 하이브리드</text>
    <text x="950" y="425" text-anchor="middle" class="ann" fill="#1B64DA" style="font-weight:600;opacity:.85">이름 확실=그대로 · 애매=비전이 판단</text>
    <line x1="900" y1="392" x2="900" y2="293" stroke="#3182F6" stroke-width="1.3" stroke-dasharray="4 4"/>

    <!-- 하단 진행 점(장식) -->
    <g>
      <circle cx="706" cy="510" r="5" fill="#8B95A1"/>
      <circle cx="724" cy="510" r="5" fill="#8B95A1"/>
      <circle cx="742" cy="510" r="5" fill="#3182F6"/>
      <circle cx="760" cy="510" r="5" fill="#D1D6DB"/>
    </g>
  </svg>
  </div>
  <div class="hint">← 좌우로 스크롤하면 전체 흐름을 볼 수 있어요</div>

  <div class="legend">
    <span class="it"><span class="sw" style="background:#D1D6DB"></span>별도 모듈 (PDF·GraphRAG)</span>
    <span class="it"><span class="sw" style="background:#3182F6"></span>우리 구현 (3D)</span>
    <span class="it"><span class="sw" style="background:#3182F6;opacity:.5"></span>Azure</span>
    <span class="it"><span class="sw" style="background:#00B27A"></span>GPT-4.1</span>
  </div>

  <footer>
    <b>PDF 전처리 · GraphRAG</b>는 학습 내용을 '방·개념 구조(palace.json)'로 만들고,
    <b style="color:#3182F6">3D</b>는 그 구조를 <b>방 GLB 위에 마커로 배치</b>해 걸어 다니는 공간으로 구현해요.<br>
    마커가 생기는 7단계는 <a href="how-markers-work.html">여기서 자세히 →</a>
  </footer>
</body>
</html>
