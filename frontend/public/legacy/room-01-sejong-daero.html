<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>1단계 세종대로 진입부</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: #f5f7f6;
      font-family: "IBM Plex Sans KR", "Malgun Gothic", system-ui, sans-serif;
      background:
        linear-gradient(115deg, rgba(149, 200, 189, .18), transparent 34%),
        radial-gradient(circle at 22% 16%, rgba(195, 229, 220, .18), transparent 30%),
        #071014;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(780px, 100%);
      border: 1px solid rgba(195, 229, 220, .26);
      border-radius: 10px;
      background: rgba(7, 10, 11, .82);
      box-shadow: 0 24px 80px rgba(0, 0, 0, .46);
      padding: 26px;
    }
    .kicker {
      color: #bac9c6;
      font-size: 11px;
      letter-spacing: .16em;
      text-transform: uppercase;
      font-weight: 900;
    }
    h1 { margin: 8px 0 10px; font-size: clamp(28px, 5vw, 44px); line-height: 1.1; }
    p { color: #bac9c6; line-height: 1.7; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 22px 0; }
    .tile { border: 1px solid rgba(195, 229, 220, .18); border-radius: 8px; padding: 14px; background: rgba(255, 255, 255, .055); }
    .tile strong { display: block; margin-bottom: 6px; }
    a { color: #d8f3ec; font-weight: 900; text-decoration: none; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .button { border: 1px solid rgba(195, 229, 220, .38); border-radius: 8px; padding: 10px 14px; background: rgba(149, 200, 189, .16); }
    @media (max-width: 680px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <div class="kicker">Exterior entry page</div>
    <h1>1단계 세종대로 진입부</h1>
    <p>광화문 기억궁전의 첫 건물입니다. 현재 단계에서는 실내를 렌더링하지 않고, 외관 건물 클릭과 페이지 이동 흐름만 확인합니다.</p>
    <section class="grid">
      <article class="tile"><strong>역할</strong><span>전체 흐름의 출발점</span></article>
      <article class="tile"><strong>공간 단서</strong><span>세종대로 축의 입구</span></article>
      <article class="tile"><strong>추후 확장</strong><span>1인칭 실내 방</span></article>
    </section>
    <div class="actions">
      <a class="button" href="/">광화문 맵으로 돌아가기</a>
      <a class="button" href="room-02-yi-sunsin.html">다음 건물</a>
    </div>
  </main>
</body>
</html>
