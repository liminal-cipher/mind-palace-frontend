<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>서울 랜드마크 기억궁전 — VWorld</title>
    <script>
      // VWorld 키 부트스트랩 — ?key= → localStorage → /api/client-config 순.
      (function () {
        const storageKey = "VWORLD_API_KEY";
        function readUrlKey() {
          const url = new URL(location.href);
          const key = (url.searchParams.get("key") || "").trim();
          if (key) {
            try { localStorage.setItem(storageKey, key); } catch {}
          }
          return key;
        }
        function readServerKeySync() {
          try {
            const request = new XMLHttpRequest();
            request.open("GET", "/api/client-config", false);
            request.send(null);
            if (request.status < 200 || request.status >= 300) return "";
            const config = JSON.parse(request.responseText || "{}");
            return String(config.vworldApiKey || "").trim();
          } catch { return ""; }
        }
        const apiKey = (readUrlKey() || localStorage.getItem(storageKey) || readServerKeySync() || "").trim();
        window.__VWORLD_BOOT_KEY__ = apiKey;
        if (apiKey) {
          const src =
            "https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey=" +
            encodeURIComponent(apiKey) + "&domain=" + encodeURIComponent(location.origin);
          document.write('<script type="text/javascript" src="' + src + '"><\/script>');
        }
      })();
    </script>
    <!-- 미니맵용 Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
      :root {
        color-scheme: dark;
        --panel: rgba(10, 14, 13, 0.78);
        --line: rgba(195, 229, 220, 0.22);
        --ink: #f2efe7;
        --muted: rgba(242, 239, 231, 0.66);
        --accent: #a9d8c8;
        --gold: #dcc079;
        --shadow: 0 14px 38px rgba(0, 0, 0, 0.5);
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0; overflow: hidden;
        font-family: "Pretendard", "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
        color: var(--ink); background: #070a0b;
      }
      #vmap { position: absolute; inset: 0; }
      #vmap canvas { outline: none; }
      .scene-vignette {
        position: absolute; inset: 0; z-index: 2; pointer-events: none;
        background: radial-gradient(128% 122% at 50% 46%, transparent 62%, rgba(4, 6, 7, 0.26) 100%);
      }
      button { font: inherit; cursor: pointer; }

      /* ── 랜드마크 핫스팟 — 빨간 GPS 핀 스타일 + 호버 시 들어올림·흰 빛 ── */
      #hotspotLayer { position: absolute; inset: 0; z-index: 4; pointer-events: none; }
      .lmk {
        position: absolute; transform: translate(-50%, -100%);   /* 핀 끝(아래)이 좌표 위에 닿게 */
        display: flex; flex-direction: column; align-items: center; gap: 5px;
        background: none; border: none; padding: 0; color: var(--ink);
        pointer-events: auto; cursor: pointer;
        transition: transform 0.22s cubic-bezier(.2,.7,.3,1.2), filter 0.18s ease;
      }
      .lmk-name {
        order: -1;                                              /* 이름은 핀 위에 */
        padding: 3px 9px; border-radius: 8px;
        background: rgba(8, 12, 11, 0.82); border: 1px solid var(--line);
        font-size: 11.5px; font-weight: 800; white-space: nowrap;
        transition: background 0.18s ease, border-color 0.18s ease;
      }
      /* GPS 핀 형태 — 빨간 물방울 + 가운데 구멍 + 바닥 그림자 펄스 */
      .lmk-dot {
        position: relative; width: 30px; height: 38px;
        background: linear-gradient(180deg, #ff4d44 0%, #d62317 100%);
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        clip-path: path("M15 38 C15 38 30 22 30 14 A15 15 0 0 0 0 14 C0 22 15 38 15 38 Z");
        display: grid; place-items: center;
        font-weight: 900; font-size: 12.5px; color: #fff;
        text-shadow: 0 1px 2px rgba(0,0,0,.55);
        filter: drop-shadow(0 4px 6px rgba(0,0,0,.55));
        transition: filter 0.18s ease;
      }
      .lmk-dot::after {                                          /* 핀 머리 구멍(흰 점) */
        content: ""; position: absolute; top: 9px; left: 50%;
        width: 9px; height: 9px; border-radius: 50%;
        background: #fff;
        transform: translateX(-50%);
        box-shadow: inset 0 1px 2px rgba(0,0,0,.18);
      }
      .lmk-num {                                                 /* 번호는 구멍 위에 */
        position: relative; z-index: 1; transform: translateY(-4px);
        color: #d62317; font-size: 9.5px; font-weight: 900;
      }
      /* 핀이 땅에 박힌 듯한 바닥 펄스(파동) */
      .lmk-ripple {
        position: absolute; left: 50%; bottom: -6px;
        width: 24px; height: 8px; transform: translateX(-50%);
        background: radial-gradient(closest-side, rgba(255,77,68,.55), transparent 70%);
        border-radius: 50%;
        animation: lmkRipple 1.8s ease-out infinite;
      }
      .lmk:nth-child(2n) .lmk-ripple { animation-delay: 0.6s; }
      .lmk:nth-child(3n) .lmk-ripple { animation-delay: 1.1s; }
      @keyframes lmkRipple {
        0%   { transform: translateX(-50%) scale(0.6); opacity: 0.7; }
        100% { transform: translateX(-50%) scale(2.2); opacity: 0; }
      }
      /* 호버 — 위로 살짝 들어올리고, 핀 자체에 흰 빛 헤일로 + 이름표 강조 */
      .lmk:hover { transform: translate(-50%, -112%); z-index: 10; }
      .lmk:hover .lmk-dot {
        filter:
          drop-shadow(0 0 4px #fff)
          drop-shadow(0 0 12px rgba(255,255,255,.9))
          drop-shadow(0 0 22px rgba(255,255,255,.6))
          drop-shadow(0 8px 10px rgba(0,0,0,.55));
      }
      .lmk:hover .lmk-name {
        background: #fff; color: #1a1a1a; border-color: #fff;
        box-shadow: 0 0 12px rgba(255,255,255,.7);
      }

      /* 방 입장 핫스팟(랜드마크 뷰) */
      .enter-spot {
        position: absolute; transform: translate(-50%, -50%);
        display: none; flex-direction: column; align-items: center; gap: 6px;
        background: none; border: none; padding: 0; pointer-events: auto; z-index: 5;
      }
      .enter-dot {
        position: relative; width: 52px; height: 52px; border-radius: 50%;
        background: rgba(220, 192, 121, 0.16); border: 2px solid var(--gold);
        display: grid; place-items: center; font-size: 22px;
        box-shadow: 0 0 18px rgba(220, 192, 121, 0.4);
      }
      .enter-dot::before {
        content: ""; position: absolute; inset: -2px; border-radius: 50%;
        border: 2px solid var(--gold); animation: lmkPulse 1.5s ease-out infinite;
      }
      .enter-label {
        padding: 6px 14px; border-radius: 10px;
        background: var(--gold); color: #1d1607; font-size: 13px; font-weight: 900;
        box-shadow: var(--shadow); white-space: nowrap;
      }

      /* ── 상단: 제목/뒤로 ── */
      .top {
        position: absolute; left: 14px; top: 14px; z-index: 6;
        display: flex; align-items: center; gap: 10px;
      }
      .badge {
        padding: 9px 14px; border-radius: 10px;
        background: var(--panel); border: 1px solid var(--line);
        backdrop-filter: blur(8px); box-shadow: var(--shadow);
        font-size: 13px; font-weight: 800;
      }
      .badge small { display: block; margin-top: 2px; color: var(--muted); font-size: 11px; font-weight: 600; }
      #backBtn {
        display: none; height: 38px; padding: 0 14px; border-radius: 10px;
        background: var(--panel); border: 1px solid var(--line); color: var(--ink);
        backdrop-filter: blur(8px); font-size: 12.5px; font-weight: 800;
      }
      #backBtn:hover { background: rgba(169, 216, 200, 0.18); }

      /* 랜드마크 정보 카드(우상단, 은은) */
      .info {
        position: absolute; right: 14px; top: 14px; z-index: 6; width: 250px;
        padding: 13px 15px; border-radius: 12px;
        background: var(--panel); border: 1px solid var(--line);
        backdrop-filter: blur(10px); box-shadow: var(--shadow);
        opacity: 0; transition: opacity 0.25s ease; pointer-events: none;
      }
      .info.show { opacity: 0.92; pointer-events: auto; }
      .info .kicker { color: var(--gold); font-size: 10px; font-weight: 900; letter-spacing: 0.14em; }
      .info h2 { margin: 5px 0 6px; font-size: 19px; }
      .info p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.55; }

      /* ── 미니맵(GPS형) ── */
      .minimap {
        position: absolute; right: 14px; bottom: 14px; width: 176px; height: 176px;
        z-index: 6; border: 1px solid var(--line); border-radius: 12px; overflow: hidden;
        box-shadow: var(--shadow); background: #0c0f0d;
      }
      .minimap .leaflet-container { width: 100%; height: 100%; background: #0c0f0d; font: inherit; }
      .minimap::after {
        content: "N"; position: absolute; top: 4px; left: 7px; z-index: 500;
        color: rgba(244, 241, 234, 0.85); font-size: 10px; font-weight: 900;
        text-shadow: 0 1px 3px #000; pointer-events: none;
      }
      .mini-arrow-fixed {
        position: absolute; left: 50%; top: 50%; z-index: 600; pointer-events: none;
        width: 0; height: 0;
        border-left: 9px solid transparent; border-right: 9px solid transparent;
        border-bottom: 20px solid #ff3b30;
        transform: translate(-50%, -50%); transform-origin: 50% 62%;
        filter: drop-shadow(0 0 2px rgba(0, 0, 0, 0.85));
      }
      .mini-pin-dot {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        width: 9px; height: 9px; border-radius: 50%;
        background: var(--c); border: 1.5px solid #0c0f0d; box-shadow: 0 0 5px var(--c); z-index: 2;
      }
      .mini-pin-ring {
        position: absolute; left: 50%; top: 50%;
        width: 9px; height: 9px; border-radius: 50%; background: var(--c);
        animation: miniPulse 1.7s ease-out infinite;
      }
      @keyframes miniPulse {
        0% { transform: translate(-50%, -50%) scale(1); opacity: 0.55; }
        100% { transform: translate(-50%, -50%) scale(3.4); opacity: 0; }
      }

      .status {
        position: absolute; left: 14px; bottom: 14px; z-index: 6; max-width: 330px;
        padding: 8px 12px; border-radius: 8px;
        background: var(--panel); border: 1px solid var(--line);
        color: var(--muted); font-size: 11.5px; line-height: 1.45;
        opacity: 0.6; pointer-events: none; backdrop-filter: blur(8px);
      }

      /* 키 입력 패널 */
      .keyPanel {
        position: absolute; inset: 0; z-index: 30; display: none;
        place-items: center; background: rgba(4, 6, 7, 0.8);
      }
      .keyPanel .card {
        width: min(420px, calc(100vw - 40px)); padding: 22px;
        border-radius: 14px; background: #0d1211; border: 1px solid var(--line);
      }
      .keyPanel input {
        width: 100%; height: 38px; margin: 10px 0; padding: 0 10px;
        border-radius: 8px; border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.05); color: var(--ink);
      }
      .keyPanel button {
        height: 38px; width: 100%; border-radius: 8px; border: none;
        background: var(--accent); color: #08120f; font-weight: 900;
      }
      /* 배경 캡처용 클린 모드 — 지도만 남기고 전부 숨김 */
      .shotmode #hotspotLayer, .shotmode .top, .shotmode .info, .shotmode .minimap,
      .shotmode .status, .shotmode .enter-spot, .shotmode .scene-vignette { display: none !important; }
    </style>
  </head>
  <body>
    <div id="vmap"></div>
    <div class="scene-vignette"></div>

    <div id="hotspotLayer"></div>
    <button class="enter-spot" id="enterSpot" type="button">
      <span class="enter-dot">🏛️</span>
      <span class="enter-label" id="enterLabel">방 입장</span>
    </button>

    <div class="top">
      <div class="badge">서울 랜드마크 기억궁전<small id="modeHint">반짝이는 랜드마크를 눌러 다가가세요</small></div>
      <button id="backBtn" type="button">↩ 전체 보기</button>
      <button id="liteBtn" type="button" style="height:38px;padding:0 12px;border-radius:10px;background:var(--panel);border:1px solid var(--line);color:var(--ink);backdrop-filter:blur(8px);font-size:12px;font-weight:800;cursor:pointer" title="저사양 모드: 빌딩 레이어 숨김·해상도 낮춤·렉 ↓"></button>
    </div>
    <script>
      // 라이트 토글 — 현재 상태를 보여주고 누르면 ?lite=1/0로 다시 들어와 적용.
      (function(){ const b=document.getElementById("liteBtn"); if(!b) return;
        const isLite = /(?:^|\?|&)lite=1/.test(location.search) || (!(/(?:^|\?|&)lite=0/.test(location.search)) && false);
        // 실제 라이트 상태는 페이지 스크립트의 LITE에 있음 — 버튼 라벨은 1프레임 뒤 동기화
        setTimeout(() => { try { b.textContent = (window.LITE || isLite) ? "⚡ 라이트 ON" : "⚡ 라이트 OFF"; } catch(e){} }, 50);
        b.onclick = () => { const u = new URL(location.href);
          const cur = (u.searchParams.get("lite") === "1") || (window.LITE && u.searchParams.get("lite") !== "0");
          u.searchParams.set("lite", cur ? "0" : "1"); location.href = u.toString(); };
      })();
    </script>

    <aside class="info" id="infoCard">
      <div class="kicker" id="infoKicker">LANDMARK</div>
      <h2 id="infoTitle">광화문</h2>
      <p id="infoDesc"></p>
    </aside>

    <div class="minimap" id="minimap" aria-label="미니맵"></div>
    <div class="status" id="status">VWorld 3D 준비 중…</div>

    <section class="keyPanel" id="keyPanel">
      <div class="card">
        <strong>VWorld API 키가 필요합니다</strong>
        <p style="color: var(--muted); font-size: 12px">발급: vworld.kr → 인증키. 키는 이 브라우저에만 저장됩니다.</p>
        <input id="keyInput" placeholder="VWorld API Key" />
        <button id="keySave" type="button">저장하고 시작</button>
      </div>
    </section>

    <script>
      "use strict";
      const qs = (id) => document.getElementById(id);
      const QP = new URLSearchParams(location.search);
      // ?shot=1 — 배경 캡처용 클린 모드(UI 전부 숨김), ?focus=<id> — 해당 랜드마크 프리셋으로 자동 이동
      if (QP.get("shot") === "1") document.documentElement.classList.add("shotmode");
      // 저사양(내장그래픽) 자동 감지 — Intel/UHD/낮은 CPU·메모리 → 빌딩 레이어 끄고 해상도 낮춤.
      const LITE = (() => {
        const q = QP.get("lite");
        if (q === "1") return true;
        if (q === "0") return false;
        try {
          const cv = document.createElement("canvas");
          const gl = cv.getContext("webgl2") || cv.getContext("webgl") || cv.getContext("experimental-webgl");
          if (!gl) return true;
          const dbg = gl.getExtension("WEBGL_debug_renderer_info");
          const r = dbg ? String(gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) || "") : "";
          if (/Intel|UHD|Iris\b|HD Graphics|Mesa|llvmpipe|SwiftShader|Microsoft Basic/i.test(r)) return true;
          if ((navigator.hardwareConcurrency || 8) <= 4) return true;
          if ((navigator.deviceMemory || 8) <= 4) return true;
        } catch {}
        return false;
      })();
      if (LITE) console.info("[landmarks] LITE 모드 — 빌딩 레이어 숨김·렌더 온디맨드·해상도 0.7");
      window.LITE = LITE;
      const setStatus = (t) => { qs("status").textContent = t; };

      // ── 랜드마크 10 — 마커 위경도 + "미리 지정한 최적 카메라"(위치/방향) + 연결 방 ──
      const ROOM_A = "memory-walk.html?glb=public/assets/rooms/dining_kitchen_baked.glb&hotspots=public/data/dining-hotspots.json";
      const ROOM_B = "memory-walk.html?glb=public/assets/rooms/loft.glb&hotspots=public/data/loft-hotspots.json";
      const LANDMARKS = [
        { id: "gwanghwamun", title: "광화문",     desc: "경복궁의 정문이자 세종대로의 시작. 한국사 흐름의 출발점을 둡니다.",
          lon: 126.97695, lat: 37.57617, alt: 20,
          cam: { lon: 126.9769, lat: 37.5715, h: 270, heading: 0, pitch: -28 }, room: ROOM_A + "&lm=gwanghwamun" },
        { id: "gyeongbokgung", title: "경복궁",   desc: "조선의 법궁. 근정전 일곽을 한눈에 담습니다.",
          lon: 126.97700, lat: 37.57880, alt: 25,
          cam: { lon: 126.9770, lat: 37.5746, h: 340, heading: 0, pitch: -28 }, room: ROOM_B + "&lm=gyeongbokgung" },
        { id: "namsan", title: "남산서울타워",    desc: "서울의 수직 랜드마크. 도시 전체를 내려다보는 기준점.",
          lon: 126.98817, lat: 37.55126, alt: 240,
          cam: { lon: 126.9882, lat: 37.5648, h: 850, heading: 180, pitch: -17 }, room: ROOM_A + "&lm=namsan" },
        { id: "cheonggye", title: "청계광장",     desc: "청계천의 시작. 물길을 따라 동쪽으로 이어집니다.",
          lon: 126.97786, lat: 37.56924, alt: 10,
          cam: { lon: 126.9752, lat: 37.5690, h: 190, heading: 95, pitch: -26 }, room: ROOM_B + "&lm=cheonggye" },
        { id: "sungnyemun", title: "숭례문",      desc: "국보 1호 남대문. 도성의 남쪽 정문.",
          lon: 126.97537, lat: 37.55999, alt: 15,
          cam: { lon: 126.9754, lat: 37.5562, h: 260, heading: 0, pitch: -28 }, room: ROOM_A + "&lm=sungnyemun" },
        { id: "deoksugung", title: "덕수궁",      desc: "대한제국의 황궁. 돌담길과 함께 기억합니다.",
          lon: 126.97487, lat: 37.56577, alt: 15,
          cam: { lon: 126.9749, lat: 37.5620, h: 260, heading: 0, pitch: -27 }, room: ROOM_B + "&lm=deoksugung" },
        { id: "bosingak", title: "보신각",        desc: "종로의 이름이 시작된 종각. 제야의 종.",
          lon: 126.98379, lat: 37.56982, alt: 12,
          cam: { lon: 126.9838, lat: 37.5660, h: 240, heading: 0, pitch: -26 }, room: ROOM_A + "&lm=bosingak" },
        { id: "jongmyo", title: "종묘",           desc: "조선 왕실의 사당. 유네스코 세계유산.",
          lon: 126.99412, lat: 37.57435, alt: 18,
          cam: { lon: 126.9941, lat: 37.5702, h: 330, heading: 0, pitch: -27 }, room: ROOM_B + "&lm=jongmyo" },
        { id: "changdeokgung", title: "창덕궁",   desc: "자연과 어우러진 궁궐. 후원으로 이어집니다.",
          lon: 126.99101, lat: 37.57935, alt: 18,
          cam: { lon: 126.9910, lat: 37.5752, h: 330, heading: 0, pitch: -27 }, room: ROOM_A + "&lm=changdeokgung" },
        { id: "heunginjimun", title: "흥인지문",  desc: "동대문. 도성 동쪽 관문이자 시장 거리의 시작.",
          lon: 127.00945, lat: 37.57129, alt: 15,
          cam: { lon: 127.0095, lat: 37.5672, h: 280, heading: 0, pitch: -27 }, room: ROOM_B + "&lm=heunginjimun" },
      ];

      // 시작 오버뷰 — 종로~남산이 모두 들어오는 남쪽 상공.
      const OVERVIEW = { lon: 126.989, lat: 37.5425, h: 3000, heading: 0, pitch: -38 };

      let map = null;
      let mode = "overview";       // overview | landmark
      let currentIdx = -1;

      // ── 키 / 부팅 ──
      async function getConfiguredKey() {
        const k = (window.__VWORLD_BOOT_KEY__ || "").trim();
        if (k) return k;
        try {
          const response = await fetch("/api/client-config", { cache: "no-store" });
          if (response.ok) {
            const config = await response.json();
            return String(config.vworldApiKey || "").trim();
          }
        } catch {}
        return "";
      }
      qs("keySave").addEventListener("click", () => {
        const v = (qs("keyInput").value || "").trim();
        if (!v) return;
        try { localStorage.setItem("VWORLD_API_KEY", v); } catch {}
        location.reload();
      });

      async function boot() {
        buildHotspots();
        const apiKey = await getConfiguredKey();
        if (!apiKey || !window.vw) {
          qs("keyPanel").style.display = "grid";
          return;
        }
        startMap();
      }

      function startMap() {
        setStatus("서울 3D 지도를 생성하는 중…");
        const initPosition = new vw.CameraPosition(
          new vw.CoordZ(OVERVIEW.lon, OVERVIEW.lat, OVERVIEW.h),
          new vw.Direction(OVERVIEW.heading, OVERVIEW.pitch, 0),
        );
        map = new vw.Map();
        map.setOption({ mapId: "vmap", initPosition, logo: false, navigation: false });
        map.setMapId("vmap");
        map.setInitPosition(initPosition);
        map.setLogoVisible(false);
        map.setNavigationZoomVisible(false);
        map.start();
        window.vworldMap = map;
        setStatus("반짝이는 랜드마크를 눌러 다가가세요.");
        window.setTimeout(() => {
          applyCameraConstraints();
          const f = QP.get("focus");                          // 캡처/딥링크용 자동 포커스
          const fi = LANDMARKS.findIndex(m => m.id === f);
          if (fi >= 0) { focusLandmark(fi); flyToCam(LANDMARKS[fi].cam, 0); }
        }, 1800);
        window.setTimeout(() => {                              // VWorld 정착에 밀렸을 때 한 번 더
          const f = QP.get("focus");
          const fi = LANDMARKS.findIndex(m => m.id === f);
          if (fi >= 0) flyToCam(LANDMARKS[fi].cam, 0);
        }, 3400);
        requestAnimationFrame(tick);
      }

      function getViewer() {
        if (window.ws3d && window.ws3d.viewer) return window.ws3d.viewer;
        return null;
      }

      function applyCameraConstraints() {
        const viewer = getViewer();
        const C = window.Cesium;
        if (!viewer || !C) return;
        viewer.scene.backgroundColor = new C.Color(7 / 255, 10 / 255, 11 / 255, 1);
        // ── 라이트 모드: GPU 부담 최소화(빌딩 레이어 숨김·해상도 0.7·온디맨드 렌더) ──
        if (LITE) {
          try { viewer.resolutionScale = 0.7; } catch {}                  // 픽셀 수 ↓ 약 49%
          try { viewer.scene.requestRenderMode = true;                    // 변화 있을 때만 그림
                viewer.scene.maximumRenderTimeChange = 0.25; } catch {}
          try { viewer.scene.fog.enabled = false; } catch {}
          try { viewer.scene.globe.showGroundAtmosphere = false; } catch {}
          // 서울 3D 빌딩(가장 비싼 항목) 숨김 — 랜드마크 페이지는 위성/지형만 있으면 충분
          const map = window.vworldMap;
          if (map && map.getLayerElement) ["facility_build","facility_build_world"].forEach(n => {
            try { const L = map.getLayerElement(n); if (L && L.hide) L.hide(); } catch {}
          });
        }
        const ctrl = viewer.scene.screenSpaceCameraController;
        ctrl.maximumZoomDistance = 5200;   // 오버뷰(3km) 여유
        ctrl.minimumZoomDistance = 60;
        // 서울 도심 밖으로 못 나가게만 느슨히 (종로~남산 전역 허용)
        const bounds = {
          minLon: C.Math.toRadians(126.945), maxLon: C.Math.toRadians(127.045),
          minLat: C.Math.toRadians(37.515),  maxLat: C.Math.toRadians(37.615),
        };
        const MAX_PITCH = -((5 * Math.PI) / 180);
        viewer.camera.moveEnd.addEventListener(() => {
          const pos = viewer.camera.positionCartographic;
          const lon = C.Math.clamp(pos.longitude, bounds.minLon, bounds.maxLon);
          const lat = C.Math.clamp(pos.latitude, bounds.minLat, bounds.maxLat);
          const h = C.Math.clamp(pos.height, ctrl.minimumZoomDistance, ctrl.maximumZoomDistance);
          const pitch = Math.min(viewer.camera.pitch, MAX_PITCH);
          const tol = 1e-8;
          const moved = Math.abs(lon - pos.longitude) > tol || Math.abs(lat - pos.latitude) > tol || Math.abs(h - pos.height) > tol;
          if (moved || Math.abs(pitch - viewer.camera.pitch) > tol) {
            viewer.scene.camera.setView({
              destination: C.Cartesian3.fromRadians(lon, lat, h),
              orientation: { heading: viewer.camera.heading, pitch, roll: viewer.camera.roll },
            });
          }
        });
      }

      // ── 핫스팟 DOM ──
      function buildHotspots() {
        const layer = qs("hotspotLayer");
        LANDMARKS.forEach((m, i) => {
          const el = document.createElement("button");
          el.className = "lmk";
          el.id = "lmk-" + i;
          el.type = "button";
          el.innerHTML = `<span class="lmk-name">${m.title}</span>` +
                         `<span class="lmk-dot"><span class="lmk-num">${i + 1}</span></span>` +
                         `<span class="lmk-ripple"></span>`;
          el.addEventListener("click", () => focusLandmark(i));
          layer.appendChild(el);
        });
        qs("enterSpot").addEventListener("click", () => {
          if (currentIdx >= 0) location.href = LANDMARKS[currentIdx].room;
        });
        qs("backBtn").addEventListener("click", showOverview);
      }

      // ── 2단 내비게이션 ──
      function flyToCam(cam, duration) {
        const viewer = getViewer();
        const C = window.Cesium;
        if (!viewer || !C) return;
        viewer.camera.flyTo({
          destination: C.Cartesian3.fromDegrees(cam.lon, cam.lat, cam.h),
          orientation: {
            heading: C.Math.toRadians(cam.heading || 0),
            pitch: C.Math.toRadians(cam.pitch),
            roll: 0,
          },
          duration: duration ?? 1.9,
        });
      }
      function focusLandmark(i) {
        mode = "landmark";
        currentIdx = i;
        const m = LANDMARKS[i];
        flyToCam(m.cam);
        qs("backBtn").style.display = "block";
        qs("modeHint").textContent = "금색 표지를 누르면 방으로 들어갑니다";
        qs("infoKicker").textContent = `LANDMARK ${i + 1} / ${LANDMARKS.length}`;
        qs("infoTitle").textContent = m.title;
        qs("infoDesc").textContent = m.desc;
        qs("infoCard").classList.add("show");
        qs("enterLabel").textContent = `${m.title} 방 입장`;
        setStatus(`${m.title} — 한 번 더 누르면 방으로 들어갑니다.`);
      }
      function showOverview() {
        mode = "overview";
        currentIdx = -1;
        flyToCam(OVERVIEW, 1.7);
        qs("backBtn").style.display = "none";
        qs("infoCard").classList.remove("show");
        qs("enterSpot").style.display = "none";
        qs("modeHint").textContent = "반짝이는 랜드마크를 눌러 다가가세요";
        setStatus("전체 보기 — 랜드마크 10곳이 반짝입니다.");
      }

      // ── 매 프레임: 핫스팟 화면 투영 + 미니맵 ──
      function project(lon, lat, alt) {
        const viewer = getViewer();
        const C = window.Cesium;
        if (!viewer || !C) return null;
        try {
          const win = C.SceneTransforms.wgs84ToWindowCoordinates(
            viewer.scene, C.Cartesian3.fromDegrees(lon, lat, alt || 15));
          if (win && Number.isFinite(win.x)) return win;
        } catch {}
        return null;
      }
      function tick() {
        const W = window.innerWidth, H = window.innerHeight;
        LANDMARKS.forEach((m, i) => {
          const el = qs("lmk-" + i);
          if (!el) return;
          // 오버뷰에선 전부, 랜드마크 뷰에선 현재 것만 숨김(입장 표지가 대신)
          const visible = mode === "overview" || i !== currentIdx;
          const win = visible ? project(m.lon, m.lat, m.alt) : null;
          if (win && win.x > -40 && win.x < W + 40 && win.y > -40 && win.y < H + 40) {
            el.style.display = "flex";
            el.style.left = win.x + "px";
            el.style.top = win.y + "px";
          } else {
            el.style.display = "none";
          }
        });
        // 입장 표지(랜드마크 뷰)
        const spot = qs("enterSpot");
        if (mode === "landmark" && currentIdx >= 0) {
          const m = LANDMARKS[currentIdx];
          const win = project(m.lon, m.lat, m.alt);
          if (win) {
            spot.style.display = "flex";
            spot.style.left = win.x + "px";
            spot.style.top = win.y + "px";
          }
        } else {
          spot.style.display = "none";
        }
        updateMinimap();
        // 라이트 모드는 30fps로 — 매 프레임 미니맵·핫스팟 투영을 절반으로
        if (LITE) setTimeout(() => requestAnimationFrame(tick), 33);
        else requestAnimationFrame(tick);
      }

      // ── 미니맵(GPS형: 화살표 중앙 고정, 맵이 따라옴) ──
      let miniMap = null;
      function initMinimap() {
        if (miniMap || !window.L) return;
        const key = (window.__VWORLD_BOOT_KEY__ || localStorage.getItem("VWORLD_API_KEY") || "").trim();
        miniMap = L.map("minimap", {
          zoomControl: false, attributionControl: false, dragging: false,
          scrollWheelZoom: false, doubleClickZoom: false, boxZoom: false,
          keyboard: false, touchZoom: false, zoomSnap: 0,
        }).setView([37.566, 126.989], 12.6);
        if (key) {
          L.tileLayer(`https://api.vworld.kr/req/wmts/1.0.0/${key}/Base/{z}/{y}/{x}.png`,
            { minZoom: 11, maxZoom: 19, opacity: 0.45 }).addTo(miniMap);
        }
        LANDMARKS.forEach((m, i) => {
          L.marker([m.lat, m.lon], {
            icon: L.divIcon({
              className: "mini-pin",
              html: `<span class="mini-pin-ring" style="--c:#a9d8c8;animation-delay:${(i * 0.2).toFixed(1)}s"></span>` +
                    `<span class="mini-pin-dot" style="--c:#a9d8c8"></span>`,
              iconSize: [12, 12], iconAnchor: [6, 6],
            }),
            interactive: false, keyboard: false,
          }).addTo(miniMap);
        });
        const arrow = document.createElement("div");
        arrow.className = "mini-arrow-fixed";
        arrow.id = "miniArrow";
        qs("minimap").appendChild(arrow);
        setTimeout(() => miniMap && miniMap.invalidateSize(), 100);
      }
      function updateMinimap() {
        if (!miniMap) initMinimap();
        if (!miniMap) return;
        try {
          const viewer = getViewer();
          if (viewer && viewer.camera && viewer.camera.positionCartographic) {
            const c = viewer.camera.positionCartographic;
            miniMap.setView([(c.latitude * 180) / Math.PI, (c.longitude * 180) / Math.PI],
              miniMap.getZoom(), { animate: false });
            const arrow = qs("miniArrow");
            if (arrow)
              arrow.style.transform =
                `translate(-50%, -50%) rotate(${((viewer.camera.heading || 0) * 180) / Math.PI}deg)`;
          }
        } catch {}
      }

      window.addEventListener("load", boot);
    </script>
  </body>
</html>
